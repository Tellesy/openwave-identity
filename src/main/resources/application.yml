server:
  port: ${SERVER_PORT:8095}
  servlet:
    context-path: /v1

spring:
  application:
    name: openwave-identity
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/openwave_identity}
    username: ${DB_USER:openwave}
    password: ${DB_PASSWORD:openwave}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

registry:
  operator: "Neptune Fintech"
  operator-url: "https://www.neptune.ly"
  governance-charter-url: "https://github.com/openwave-standard/openwave-spec/blob/main/GOVERNANCE.md"
  source-code-url: "https://github.com/openwave-standard/openwave-identity"
  country-scope: "LY"
  future-operator: "Central Bank of Libya (planned)"
  uptime-sla: "99.9%"
  admin-key: ${REGISTRY_ADMIN_KEY:change-me-in-production}
  resolve-cache-ttl-seconds: 60
  resolve-rate-limit-per-minute: 120

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
