<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OpenWave Identity - Page not found</title>
    <meta name="theme-color" content="#07315F" />
    <style>
      :root {
        --navy: #07315f;
        --coral: #eb4e4d;
        --teal: #00a8ae;
        --ink: #071a2f;
        --muted: #5f6b7a;
        --line: #dfe5ea;
        --paper: #f7f7f4;
        --panel: #ffffff;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 28px;
        color: var(--ink);
        background: var(--paper);
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
      }
      main {
        width: min(760px, 100%);
        padding: clamp(28px, 6vw, 56px);
        border: 1px solid var(--line);
        border-radius: 28px;
        background: var(--panel);
        box-shadow: 0 32px 90px rgba(7, 49, 95, 0.12);
      }
      .mark {
        width: 48px;
        height: 48px;
        display: grid;
        place-items: center;
        border-radius: 15px;
        background: var(--navy);
        color: #fff;
        font-weight: 840;
      }
      p.eyebrow {
        margin: 28px 0 14px;
        color: var(--teal);
        font-size: 13px;
        font-weight: 820;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }
      h1 {
        margin: 0;
        font-size: clamp(42px, 8vw, 72px);
        line-height: 0.98;
        letter-spacing: -0.055em;
      }
      .lede {
        margin: 22px 0 0;
        color: var(--muted);
        font-size: 19px;
        line-height: 1.6;
      }
      .actions {
        margin-top: 30px;
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }
      a {
        min-height: 46px;
        padding: 0 20px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 999px;
        color: #fff;
        background: var(--navy);
        font-weight: 760;
        text-decoration: none;
      }
      a.secondary {
        color: var(--ink);
        background: var(--panel);
        border: 1px solid var(--line);
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark">OW</div>
      <p class="eyebrow">OpenWave Identity</p>
      <h1>Page not found.</h1>
      <p class="lede">This registry documentation page moved or does not exist. Continue from the Identity home page or the OpenWave standard reference.</p>
      <div class="actions">
        <a href="./">OpenWave Identity home</a>
        <a class="secondary" href="https://neptune-ly.github.io/openwave-spec/api/identity.html">Identity API reference</a>
      </div>
    </main>
  </body>
</html>
